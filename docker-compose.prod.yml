version: '3.9'

services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/combine-trade-api:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env.prod
    networks: [combine-prod]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  workers:
    image: ghcr.io/${GITHUB_REPOSITORY}/combine-trade-workers:${TAG:-latest}
    restart: unless-stopped
    env_file: .env.prod
    networks: [combine-prod]
    depends_on:
      api:
        condition: service_healthy

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/combine-trade-web:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
    networks: [combine-prod]
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    env_file: .env.prod
    networks: [combine-prod]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  combine-prod:
    driver: bridge

volumes:
  postgres-prod-data:
