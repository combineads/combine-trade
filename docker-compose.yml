services:
  # ── Production DB ──────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: combine_trade
      POSTGRES_USER: combine
      POSTGRES_PASSWORD: combine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U combine -d combine_trade"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql

  # ── Test DB ────────────────────────────────────────────────────────────────
  db-test:
    image: pgvector/pgvector:pg18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: combine_trade_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d combine_trade_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-test-data:/var/lib/postgresql

volumes:
  postgres-data:
  postgres-test-data:
