services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: combine-trade-db
    environment:
      POSTGRES_USER: combine
      POSTGRES_PASSWORD: combine
      POSTGRES_DB: combine_trade
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    command:
      - "postgres"
      - "-c"
      - "max_connections=30"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U combine -d combine_trade"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
