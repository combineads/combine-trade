services:
  db:
    image: pgvector/pgvector:pg18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: combine_trade_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-test-data:/var/lib/postgresql

volumes:
  postgres-test-data:
